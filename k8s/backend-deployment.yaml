apiVersion: apps/v1
kind: Deployment
metadata:
  name: bytebattle-backend
  namespace: bytebattle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bytebattle-backend
  template:
    metadata:
      labels:
        app: bytebattle-backend
    spec:
      containers:
        - name: backend
          image: slimbizid/bytebattle-backend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: bytebattle-backend-config
            - secretRef:
                name: bytebattle-backend-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bytebattle-backend
  namespace: bytebattle
spec:
  selector:
    app: bytebattle-backend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
